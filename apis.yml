    description: >-
      Domo API allows users to integrate and interact with data from various
      sources within the Domo platform. With Domo API, users can access
      real-time data, automate data processes, and create custom data
      visualizations and reports. Includes endpoints for datasets, streams,
      users, groups, pages, accounts, and activity logs.
